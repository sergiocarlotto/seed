# Override de DESENVOLVIMENTO (aplicado automaticamente por `docker compose up`).
# Expoe portas ao host para depuracao e para o modo hibrido (rodar web/api
# fora do Docker conectando ao banco em Docker).

services:
  db:
    ports:
      - "5432:5432"

  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"

  web:
    ports:
      - "3000:3000"
